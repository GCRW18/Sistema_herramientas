<div class="flex flex-col w-full bg-[#f8f9fc] dark:bg-[#0F172AFF] font-sans overflow-hidden">

    <div class="bg-red-500 border-b-2 border-black px-4 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white border-2 border-black rounded-lg flex items-center justify-center shrink-0 shadow-[2px_2px_0px_0px_rgba(0,0,0,0.5)]">
                <mat-icon class="text-red-600 !text-xl">warning</mat-icon>
            </div>
            <div>
                <h1 class="text-sm font-black text-white uppercase tracking-tight leading-none">
                    ANULAR ENVÍO
                </h1>
                <p class="text-[10px] font-bold text-red-100 mt-1">
                    Acción irreversible
                </p>
            </div>
        </div>
        <button mat-dialog-close
                class="w-8 h-8 bg-white border-2 border-black rounded hover:bg-gray-200 transition-colors flex items-center justify-center shrink-0 shadow-[2px_2px_0px_0px_rgba(0,0,0,0.5)]">
            <mat-icon class="!text-base text-black">close</mat-icon>
        </button>
    </div>

    <div class="p-5 flex flex-col gap-4">

        <div class="bg-red-50 dark:bg-red-900/20 border-2 border-red-300 dark:border-red-800 rounded-xl p-3">
            <p class="text-xs text-red-800 dark:text-red-200 font-bold mb-2">
                Va a anular la siguiente nota de envío. La herramienta volverá a estar disponible en almacén de forma inmediata.
            </p>
            <div class="flex flex-col gap-1 text-[10px]">
                <div class="flex justify-between border-b border-red-200 dark:border-red-800 pb-1">
                    <span class="font-black text-red-900 dark:text-red-100">NOTA:</span>
                    <span class="font-mono font-black text-red-600 dark:text-red-400">{{ calibracion.record_number }}</span>
                </div>
                <div class="flex justify-between pt-1">
                    <span class="font-black text-red-900 dark:text-red-100">HERRAMIENTA:</span>
                    <span class="font-bold text-red-700 dark:text-red-300">{{ calibracion.tool_code }}</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-black text-black dark:text-white uppercase flex items-center gap-1">
                Motivo de anulación <span class="text-red-500">*</span>
            </label>
            <textarea [(ngModel)]="motivo"
                      rows="3"
                      placeholder="Escriba aquí el motivo detallado de la anulación..."
                      class="w-full text-xs font-bold border-2 border-black rounded-xl p-3 bg-white dark:bg-slate-800 text-black dark:text-white focus:shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] outline-none resize-none transition-shadow"></textarea>
            <span *ngIf="motivo.trim().length === 0" class="text-[9px] font-bold text-red-500 mt-1">
                Este campo es obligatorio para proceder.
            </span>
        </div>

    </div>

    <div class="bg-gray-100 dark:bg-slate-800 border-t-2 border-black px-4 py-3 flex items-center justify-end gap-3 shrink-0">
        <button mat-dialog-close
                class="px-4 py-2 bg-white dark:bg-slate-700 text-black dark:text-white font-black text-xs border-2 border-black rounded-lg hover:bg-gray-50 dark:hover:bg-slate-600 transition-colors uppercase">
            Cancelar
        </button>
        <button (click)="confirmar()"
                [disabled]="motivo.trim().length === 0"
                class="px-5 py-2 bg-red-600 text-white font-black text-xs border-2 border-black rounded-lg shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-[1px] hover:translate-y-[1px] transition-all uppercase disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
            <mat-icon class="!text-sm">block</mat-icon>
            Confirmar Anulación
        </button>
    </div>
</div>
