<div class="flex flex-col w-full bg-white dark:bg-slate-900 border-[3px] border-black shadow-[6px_6px_0px_0px_#000] font-sans overflow-hidden rounded-2xl">

    <!-- HEADER -->
    <div class="bg-[#FF1414FF] border-b-[3px] border-black px-5 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white border-2 border-black rounded-xl flex items-center justify-center shrink-0 shadow-[2px_2px_0px_0px_#000]">
                <mat-icon class="text-[#FF1414FF] !text-xl">warning</mat-icon>
            </div>
            <div>
                <h1 class="text-base font-black text-white uppercase tracking-tight leading-none">
                    Anular Envío
                </h1>
                <p class="text-[10px] font-bold text-white mt-1 uppercase tracking-wider">
                    Acción irreversible
                </p>
            </div>
        </div>
        <button mat-dialog-close class="w-8 h-8 bg-white border-2 border-black rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center shrink-0 shadow-[2px_2px_0px_0px_#000] hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none">
            <mat-icon class="!text-base text-black">close</mat-icon>
        </button>
    </div>

    <!-- BODY -->
    <div class="p-6 flex flex-col gap-5">

        <!-- Alerta Info -->
        <div class="bg-red-50 dark:bg-red-900/30 border-[3px] border-black rounded-xl p-4 shadow-[4px_4px_0px_0px_#000]">
            <p class="text-sm text-black dark:text-white font-black mb-3 leading-tight uppercase">
                La herramienta volverá a estar disponible en almacén inmediatamente.
            </p>
            <div class="flex flex-col gap-2 text-xs">
                <div class="flex justify-between border-b-2 border-black border-dashed pb-2">
                    <span class="font-black text-gray-500 dark:text-gray-400">NOTA ASIGNADA:</span>
                    <span class="font-mono font-black bg-amber-300 text-black px-2 py-0.5 rounded border-2 border-black">{{ calibracion.record_number }}</span>
                </div>
                <div class="flex justify-between pt-1">
                    <span class="font-black text-gray-500 dark:text-gray-400">HERRAMIENTA:</span>
                    <span class="font-black text-black dark:text-white">{{ calibracion.tool_code }}</span>
                </div>
            </div>
        </div>

        <!-- Input Textarea -->
        <div class="flex flex-col gap-2">
            <label class="text-xs font-black text-black dark:text-white uppercase flex items-center gap-1">
                Motivo de anulación <span class="text-[#FF1414FF] text-lg leading-none">*</span>
            </label>
            <textarea [(ngModel)]="motivo" rows="3"
                      placeholder="Escriba aquí el motivo detallado de la anulación..."
                      class="w-full text-xs font-bold border-[3px] border-black rounded-xl p-3 bg-white dark:bg-slate-800 text-black dark:text-white focus:shadow-[4px_4px_0px_0px_#000] focus:-translate-y-[2px] outline-none resize-none transition-all"></textarea>
            <span *ngIf="motivo.trim().length === 0" class="text-[10px] font-black uppercase text-[#FF1414FF]">
                Campo obligatorio para proceder
            </span>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="bg-gray-100 dark:bg-slate-800 border-t-[3px] border-black px-6 py-4 flex items-center justify-end gap-4 shrink-0">
        <button mat-dialog-close class="px-5 py-2.5 bg-white dark:bg-slate-700 text-black dark:text-white font-black text-xs border-[3px] border-black rounded-xl shadow-[3px_3px_0px_0px_#000] hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none transition-all uppercase">
            Cancelar
        </button>
        <button (click)="confirmar()" [disabled]="motivo.trim().length === 0"
                class="px-5 py-2.5 bg-[#FF1414FF] text-white font-black text-xs border-[3px] border-black rounded-xl shadow-[3px_3px_0px_0px_#000] hover:shadow-none hover:translate-x-[1px] hover:translate-y-[1px] transition-all uppercase disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
            <mat-icon class="!text-base">block</mat-icon> Confirmar Anulación
        </button>
    </div>
</div>
