<!-- Envoltura principal con padding para dejar espacio a la sombra neobrutalista sin que el modal de Material la corte -->
<div class="w-full h-full p-2 box-border flex flex-col max-h-[90vh] animate-fadeIn">

    <!-- TARJETA PRINCIPAL (El contenedor que corta todo perfectamente) -->
    <div class="flex flex-col flex-1 bg-gray-200 dark:bg-slate-800 rounded-2xl border-[3px] border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] overflow-hidden isolate relative">

        <!-- CABECERA ROJA ARRASTRABLE -->
        <div class="bg-[#FF1414FF] text-white px-5 py-3 border-b-[3px] border-black flex justify-between items-center shrink-0 cursor-move" cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
            <h2 class="text-sm font-black uppercase flex items-center gap-2 tracking-wide pointer-events-none">
                <mat-icon class="!text-[20px]">delete_sweep</mat-icon> AGREGAR ÍTEM A BAJA
            </h2>
            <button (click)="cerrar()" class="w-8 h-8 flex items-center justify-center bg-black text-white font-black border-[2px] border-white/20 rounded-lg hover:bg-gray-800 transition-all cursor-pointer shadow-[2px_2px_0px_0px_rgba(0,0,0,0.5)]">
                <mat-icon class="!text-[18px]">close</mat-icon>
            </button>
        </div>

        <!-- CUERPO DEL MODAL (A Dos Columnas con Scroll) -->
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar bg-gray-200 dark:bg-slate-800">

            <form [formGroup]="bajaForm" class="flex flex-col md:flex-row gap-4 h-full">

                <!-- ========================================== -->
                <!-- COLUMNA IZQUIERDA (Buscar + Detalles)      -->
                <!-- ========================================== -->
                <div class="w-full md:w-[55%] flex flex-col gap-4">

                    <!-- TARJETA 1: BUSCAR HERRAMIENTA -->
                    <div class="bg-white dark:bg-slate-700 border-[3px] border-black rounded-xl p-4 shadow-[4px_4px_0px_0px_#000]">
                        <h3 class="text-[11px] font-black uppercase text-black dark:text-white mb-3 flex items-center gap-2 border-b-2 border-black pb-1">
                            <mat-icon class="!text-[16px]">search</mat-icon> BUSCAR HERRAMIENTA EN SISTEMA
                        </h3>

                        <div class="relative">
                            <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">CÓDIGO O NOMBRE *</label>
                            <div class="relative">
                                <input type="text"
                                       [value]="buscarTermino()"
                                       (input)="onBuscarChange($any($event.target).value)"
                                       (blur)="ocultarSugerencias()"
                                       placeholder="ESCRIBA PARA BUSCAR..."
                                       autocomplete="off"
                                       class="w-full h-10 text-xs font-black border-[2px] border-black rounded-lg pl-9 pr-8 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none uppercase focus:shadow-[3px_3px_0px_0px_#000] transition-shadow">
                                <mat-icon class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-500 !text-[18px]">search</mat-icon>

                                <button *ngIf="buscarTermino()" type="button" (click)="limpiarBusqueda()" class="absolute right-2 top-1/2 -translate-y-1/2 text-black dark:text-white hover:text-red-500 transition-colors">
                                    <mat-icon class="!text-[18px]">close</mat-icon>
                                </button>
                            </div>

                            <!-- Dropdown Sugerencias -->
                            <div *ngIf="showSuggestions && herramientasFiltradas().length > 0" class="absolute z-[70] w-full bg-white dark:bg-slate-800 border-[2px] border-black rounded-lg shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] max-h-48 overflow-y-auto mt-1 top-full left-0">
                                <button type="button" *ngFor="let t of herramientasFiltradas()" (mousedown)="selectHerramienta(t)" class="w-full text-left px-4 py-2 hover:bg-yellow-50 dark:hover:bg-slate-600 cursor-pointer border-b border-gray-200 dark:border-gray-700 flex flex-col transition-colors">
                                    <span class="text-xs font-black uppercase text-black dark:text-white">{{ t.codigo }}</span>
                                    <span class="text-[10px] font-bold text-gray-500">{{ t.nombre }}</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- TARJETA 2: DETALLES DEL ÍTEM -->
                    <div class="bg-white dark:bg-slate-700 border-[3px] border-black rounded-xl p-4 shadow-[4px_4px_0px_0px_#000] flex-1">
                        <h3 class="text-[11px] font-black uppercase text-black dark:text-white mb-3 flex items-center gap-2 border-b-2 border-black pb-1">
                            <mat-icon class="!text-[16px]">build</mat-icon> DETALLES DEL ÍTEM
                        </h3>

                        <div class="grid grid-cols-12 gap-2.5 mb-2.5">
                            <div class="col-span-4">
                                <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">CÓDIGO *</label>
                                <input formControlName="codigo" type="text" readonly
                                       class="w-full h-9 text-[10px] font-black border-[2px] border-gray-300 dark:border-gray-600 rounded-lg px-2.5 bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 outline-none uppercase transition-colors cursor-not-allowed" />
                            </div>
                            <div class="col-span-4">
                                <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">BASE</label>
                                <input formControlName="base" type="text" readonly
                                       class="w-full h-9 text-[10px] font-black border-[2px] border-gray-300 dark:border-gray-600 rounded-lg px-2.5 bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 outline-none uppercase transition-colors cursor-not-allowed" />
                            </div>
                            <div class="col-span-4">
                                <label class="text-[9px] font-black uppercase text-blue-600 dark:text-blue-400 block mb-1">STOCK SISTEMA</label>
                                <input type="number" formControlName="existencia" readonly
                                       class="w-full h-9 text-xs font-black border-[2px] border-blue-400 rounded-lg px-2 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 outline-none text-center shadow-inner cursor-not-allowed">
                            </div>
                        </div>

                        <div class="grid grid-cols-12 gap-2.5 mb-2.5">
                            <div class="col-span-6">
                                <label class="text-[9px] font-black uppercase text-gray-600 dark:text-gray-400 block mb-1">P/N</label>
                                <input type="text" formControlName="pn" readonly
                                       class="w-full h-9 text-[10px] font-bold border-[2px] border-gray-300 dark:border-gray-600 rounded-lg px-2.5 bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 outline-none transition-colors uppercase cursor-not-allowed">
                            </div>
                            <div class="col-span-6">
                                <label class="text-[9px] font-black uppercase text-gray-600 dark:text-gray-400 block mb-1">S/N</label>
                                <input type="text" formControlName="sn" readonly
                                       class="w-full h-9 text-[10px] font-bold border-[2px] border-gray-300 dark:border-gray-600 rounded-lg px-2.5 bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 outline-none transition-colors uppercase cursor-not-allowed">
                            </div>
                        </div>

                        <div>
                            <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">NOMBRE / DESCRIPCIÓN *</label>
                            <input type="text" formControlName="nombre" readonly
                                   class="w-full h-9 text-[11px] font-black border-[2px] border-gray-300 dark:border-gray-600 rounded-lg px-3 bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 outline-none truncate transition-colors uppercase cursor-not-allowed" />
                        </div>
                    </div>

                </div>

                <!-- ========================================== -->
                <!-- COLUMNA DERECHA (Config Baja + Imagen)     -->
                <!-- ========================================== -->
                <div class="w-full md:w-[45%] flex flex-col gap-4">

                    <div class="bg-white dark:bg-slate-700 border-[3px] border-black rounded-xl p-4 shadow-[4px_4px_0px_0px_#000] flex flex-col h-full">
                        <h3 class="text-[11px] font-black uppercase text-black dark:text-white mb-3 flex items-center gap-2 border-b-2 border-black pb-1">
                            <mat-icon class="!text-[16px]">assignment_late</mat-icon> CONFIGURACIÓN DE BAJA & IMAGEN
                        </h3>

                        <!-- Configuración Baja -->
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">CANTIDAD A BAJA *</label>
                                <input type="number" formControlName="cantidad" min="1"
                                       class="w-full h-9 text-sm font-black text-[#FF1414FF] border-[2px] border-black rounded-lg px-3 bg-gray-50 dark:bg-slate-900 outline-none focus:shadow-[3px_3px_0px_0px_#000] text-center transition-shadow"
                                       [class.border-red-500]="hasError('cantidad', 'required')">
                                <p *ngIf="bajaForm.get('existencia')?.value && bajaForm.get('cantidad')?.value > bajaForm.get('existencia')?.value"
                                   class="text-[8px] font-black text-red-600 mt-1 uppercase leading-tight">⚠ Excede Stock</p>
                            </div>
                            <div>
                                <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">ESTADO ACTUAL *</label>
                                <div class="relative">
                                    <select formControlName="estadoFisico"
                                            class="w-full h-9 text-[10px] font-black border-[2px] border-black rounded-lg pl-2 pr-6 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none focus:shadow-[3px_3px_0px_0px_#000] uppercase appearance-none transition-shadow"
                                            [class.border-red-500]="hasError('estadoFisico', 'required')">
                                        <option value="BUENO">BUENO</option>
                                        <option value="REGULAR">REGULAR</option>
                                        <option value="MALO">MALO</option>
                                        <option value="INSERVIBLE">INSERVIBLE</option>
                                    </select>
                                    <mat-icon class="absolute right-1 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none !text-[16px]">expand_more</mat-icon>
                                </div>
                            </div>
                        </div>

                        <!-- Motivo -->
                        <div class="flex flex-col mb-4">
                            <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1">MOTIVO DE BAJA *</label>
                            <textarea formControlName="observacion" rows="2" placeholder="Explique brevemente..."
                                      class="w-full text-[10px] font-bold border-[2px] border-black rounded-lg p-2.5 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none focus:shadow-[3px_3px_0px_0px_#000] resize-none custom-scrollbar transition-shadow"
                                      [class.border-red-500]="hasError('observacion', 'required')"></textarea>
                        </div>

                        <!-- Cuadro de Imagen Referencial (Ocupa el resto del espacio) -->
                        <div class="flex flex-col flex-1">
                            <label class="text-[9px] font-black uppercase text-gray-800 dark:text-gray-300 block mb-1 flex justify-between">
                                IMAGEN REFERENCIAL (OPCIONAL)
                                <span *ngIf="selectedImage()" (click)="selectedImage.set(null)" class="text-red-500 cursor-pointer hover:underline">Quitar</span>
                            </label>
                            <div class="flex-1 w-full min-h-[120px] border-[3px] border-dashed border-gray-400 dark:border-gray-500 rounded-lg flex flex-col items-center justify-center relative overflow-hidden bg-gray-50 dark:bg-slate-800 group cursor-pointer hover:border-black dark:hover:border-white transition-colors" (click)="fileInputTool.click()">

                                <img *ngIf="selectedImage()" [src]="selectedImage()" class="w-full h-full object-contain p-1 absolute inset-0 z-10 bg-white">

                                <div *ngIf="!selectedImage()" class="flex flex-col items-center text-gray-400 group-hover:text-black dark:group-hover:text-white transition-colors z-0 p-2 text-center">
                                    <mat-icon class="!text-[32px] mb-1">add_a_photo</mat-icon>
                                    <span class="text-[9px] font-black uppercase tracking-tight">CLICK PARA SUBIR FOTO</span>
                                </div>

                                <div *ngIf="selectedImage()" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-20 backdrop-blur-sm">
                                    <span class="bg-white text-black text-[9px] font-black border-[2px] border-black px-2 py-1 rounded uppercase shadow-[2px_2px_0px_0px_#000]">CAMBIAR</span>
                                </div>
                            </div>
                            <input type="file" #fileInputTool (change)="onImageSelected($event)" accept="image/*" class="hidden">
                        </div>

                    </div>
                </div>

            </form>
        </div>

        <!-- FOOTER: BOTÓN DE ACCIÓN -->
        <div class="bg-white dark:bg-slate-900 border-t-[3px] border-black p-4 flex justify-end shrink-0">
            <button (click)="agregar()" [disabled]="!isFormValid()"
                    class="px-6 py-2.5 bg-[#96D19EFF] text-black font-black text-xs border-[3px] border-black rounded-lg shadow-[4px_4px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all uppercase disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <mat-icon class="!text-sm text-black">check_circle</mat-icon> CONFIRMAR Y AGREGAR A LISTA
            </button>
        </div>

    </div>
</div>
