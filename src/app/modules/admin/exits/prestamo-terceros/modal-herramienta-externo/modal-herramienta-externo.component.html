<div class="bg-gray-100 dark:bg-slate-900 rounded-2xl border-[3px] border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] overflow-hidden flex flex-col w-full max-w-[850px] h-auto max-h-[95vh]">

    <div class="bg-[#0F172AFF] text-white px-4 py-2 border-b-[3px] border-black flex justify-between items-center shrink-0" cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
        <h2 class="text-sm font-black uppercase flex items-center gap-2 text-white">
            <mat-icon class="!text-xl text-amber-400">handshake</mat-icon>
            Agregar a Terceros
        </h2>
        <div class="flex items-center gap-2">
            <button (click)="cerrar()" class="px-3 py-1 bg-[#FF1414FF] text-white font-black text-[10px] border-2 border-black rounded hover:translate-x-[1px] hover:translate-y-[1px] transition-all uppercase">
                <span class="hidden sm:inline">Cancelar</span><mat-icon class="sm:hidden !text-xs">close</mat-icon>
            </button>
            <button (click)="agregar()" [disabled]="!prestarForm.get('codigo')?.value || !validarCantidadState()" class="px-3 py-1 bg-green-600 text-white font-black text-[10px] border-2 border-black rounded hover:translate-x-[1px] hover:translate-y-[1px] transition-all uppercase flex items-center gap-1 disabled:opacity-50">
                <span class="hidden sm:inline">Agregar a Lista</span>
            </button>
        </div>
    </div>

    <div class="flex flex-col md:flex-row flex-1 p-3 gap-3 bg-gray-200 dark:bg-slate-700 custom-scrollbar">

        <div class="w-full md:w-[65%] flex flex-col shrink-0 md:shrink">
            <form [formGroup]="prestarForm" class="flex flex-col bg-gray-50 dark:bg-slate-800 border-[2px] border-black rounded-lg p-2.5 shadow-[3px_3px_0px_0px_#000] gap-2.5">

                <h3 class="text-[10px] font-black uppercase text-black dark:text-white border-b-2 border-black pb-1 flex items-center gap-1">
                    <mat-icon class="!text-sm text-black dark:text-white">search</mat-icon> Búsqueda de Ítem
                </h3>

                <div class="relative">
                    <input type="text" formControlName="buscar" (input)="onBuscarChange($any($event.target).value)" (blur)="hideToolsSuggestions()" placeholder="Código, Nombre o P/N..." class="w-full h-8 text-[10px] font-bold border-2 border-black rounded px-2 bg-white dark:bg-slate-900 text-black dark:text-white outline-none uppercase focus:shadow-[2px_2px_0px_0px_#000]" />
                    <div *ngIf="showToolsSuggestions && filteredHerramientas.length > 0" class="absolute top-full left-0 right-0 z-50 mt-1 bg-white dark:bg-slate-800 border-2 border-black rounded shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] max-h-40 overflow-y-auto">
                        <button type="button" *ngFor="let h of filteredHerramientas" (mousedown)="selectHerramienta(h)" class="w-full text-left px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-slate-700 border-b border-gray-200 dark:border-gray-700">
                            <p class="text-[10px] font-black text-black dark:text-white">{{ h.codigo || h.code }} - {{ h.nombre || h.name }}</p>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-1.5 mt-1">
                    <div>
                        <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400">Código</label>
                        <input formControlName="codigo" type="text" readonly class="w-full h-8 text-[9px] font-bold border-2 border-black rounded px-1.5 bg-gray-200 dark:bg-slate-700 text-black dark:text-white cursor-not-allowed uppercase" />
                    </div>
                    <div class="col-span-2">
                        <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400">Descripción</label>
                        <input formControlName="nombre" type="text" readonly class="w-full h-8 text-[9px] font-bold border-2 border-black rounded px-1.5 bg-gray-200 dark:bg-slate-700 text-black dark:text-white cursor-not-allowed uppercase" />
                    </div>
                </div>

                <h3 class="text-[10px] font-black uppercase text-black dark:text-white border-b-2 border-black pb-1 mt-2 mb-1 flex items-center gap-1">
                    <mat-icon class="!text-sm text-black dark:text-white">monetization_on</mat-icon> Tarifas y Cantidad
                </h3>

                <div class="grid grid-cols-4 gap-1.5">
                    <div>
                        <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400 block mb-0.5">Cant.*</label>
                        <input formControlName="cantidad" type="number" min="1" class="w-full h-8 text-[10px] font-bold border-2 border-black rounded px-1.5 bg-white dark:bg-slate-900 text-black dark:text-white text-center" />
                    </div>
                    <div>
                        <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400 block mb-0.5">Horas*</label>
                        <input formControlName="horas" type="number" min="1" class="w-full h-8 text-[10px] font-bold border-2 border-black rounded px-1.5 bg-white dark:bg-slate-900 text-black dark:text-white text-center text-blue-600" />
                    </div>
                    <div>
                        <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400 block mb-0.5">Costo/Hr $ *</label>
                        <input formControlName="costoHora" type="number" min="0" step="0.5" class="w-full h-8 text-[10px] font-bold border-2 border-black rounded px-1.5 bg-white dark:bg-slate-900 text-black dark:text-white text-center text-green-600" />
                    </div>
                    <div>
                        <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400 block mb-0.5">Estado</label>
                        <select formControlName="estado" class="w-full h-8 text-[8px] font-bold border-2 border-black rounded px-0.5 bg-white dark:bg-slate-900 text-black dark:text-white">
                            <option *ngFor="let est of estados" [value]="est.value">{{ est.label }}</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col flex-1 mt-1">
                    <label class="text-[8px] font-black uppercase text-gray-700 dark:text-gray-400 block mb-0.5">Observaciones</label>
                    <textarea formControlName="observacion" rows="2" class="w-full flex-1 text-[10px] font-bold border-2 border-black rounded p-2 bg-white dark:bg-slate-900 text-black dark:text-white outline-none resize-none"></textarea>
                </div>
            </form>
        </div>

        <div class="w-full md:w-[35%] bg-gray-300 dark:bg-slate-700 flex flex-col justify-start p-3 gap-3 shrink-0 md:shrink border-[2px] border-black rounded-lg shadow-[3px_3px_0px_0px_#000]">
            <h3 class="text-xs font-black uppercase text-center text-black dark:text-white w-full border-b-2 border-black pb-1">Resumen Costo</h3>

            <div class="flex flex-col gap-2 pt-2">
                <div class="flex justify-between items-center bg-white dark:bg-slate-800 p-2 border-2 border-black rounded">
                    <span class="text-[9px] font-black text-gray-600 dark:text-gray-400 uppercase">Herramienta:</span>
                    <span class="text-[10px] font-black truncate max-w-[100px]">{{ prestarForm.value.codigo || '---' }}</span>
                </div>

                <div class="flex justify-between items-center bg-white dark:bg-slate-800 p-2 border-2 border-black rounded">
                    <span class="text-[9px] font-black text-gray-600 dark:text-gray-400 uppercase">Tarifa Total:</span>
                    <span class="text-xs font-black text-blue-600">{{ prestarForm.value.horas }}h x ${{ prestarForm.value.costoHora }}</span>
                </div>

                <div class="flex flex-col items-center justify-center bg-black p-3 border-2 border-black rounded mt-2">
                    <span class="text-[10px] font-black text-white/70 uppercase">Precio Total Estimado</span>
                    <span class="text-2xl font-black text-green-400">${{ totalMonto() | number:'1.2-2' }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
