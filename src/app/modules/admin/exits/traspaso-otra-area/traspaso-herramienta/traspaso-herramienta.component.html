<div class="flex flex-col w-full h-full bg-[#f8f9fc] dark:bg-[#0F172AFF] transition-colors duration-300 font-sans overflow-hidden"
     cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragBoundary=".cdk-overlay-container">

    <div class="fixed top-20 right-10 w-40 h-40 bg-[#111A43] rounded-full border-3 border-black opacity-5 pointer-events-none"></div>
    <div class="fixed bottom-10 left-10 w-24 h-24 bg-green-400 rotate-12 border-3 border-black opacity-10 pointer-events-none"></div>

    <div class="flex-1 overflow-y-auto p-4 md:p-6 relative custom-scrollbar">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6 relative z-10">
            <div class="flex items-center gap-4">
                <button (click)="cerrar()"
                        class="w-12 h-12 bg-white dark:bg-slate-800 border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1 hover:bg-white hover:scale-105 transition-all flex items-center justify-center rounded-lg cursor-pointer"
                        (mousedown)="$event.stopPropagation()">
                    <mat-icon class="!text-2xl text-black dark:text-white">arrow_back</mat-icon>
                </button>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-black dark:text-white uppercase tracking-tight leading-none">
                        Traspaso de Herramienta
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <p class="text-xs font-bold bg-[#111A43] text-white px-2 py-0.5 rounded-sm border border-white">
                            MOVIMIENTO A OTRA ÁREA
                        </p>
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button (click)="agregar()"
                        class="px-6 py-2 bg-green-500 text-white font-black text-sm border-2 border-black rounded-full shadow-[3px_3px_0px_0px_#000] hover:shadow-[2px_2px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] active:shadow-none transition-all uppercase">
                    Agregar
                </button>
                <button (click)="cerrar()"
                        class="px-6 py-2 bg-[#111A43] text-white font-black text-sm border-2 border-black rounded-full shadow-[3px_3px_0px_0px_#000] hover:shadow-[2px_2px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] active:shadow-none transition-all uppercase">
                    Cerrar
                </button>
            </div>
        </div>

        <!-- Form Card -->
        <div class="neo-card-base bg-white dark:bg-slate-800 p-5 mb-6 relative z-10">
            <form [formGroup]="traspasoForm">

                <div class="flex items-center gap-2 mb-4 pb-2 border-b-2 border-black dark:border-gray-600">
                    <mat-icon class="text-black dark:text-white !text-xl">search</mat-icon>
                    <h3 class="font-black text-base uppercase text-black dark:text-white">Buscar Herramienta</h3>
                </div>

                <!-- Row 1: Search + Codigo + Coincidencias -->
                <div class="flex flex-col lg:flex-row gap-4 mb-4 items-start">
                    <div class="flex-1 w-full lg:w-auto form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Código, Nombre o P/N
                        </label>
                        <select (change)="onSelectHerramienta($event)"
                                class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none appearance-none cursor-pointer">
                            <option value="">-- Seleccionar Herramienta --</option>
                            <option *ngFor="let h of filteredHerramientas" [value]="h.codigo">
                                {{ h.codigo }} - {{ h.nombre }}
                            </option>
                        </select>
                    </div>

                    <div class="w-full lg:w-40 form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Código
                        </label>
                        <select formControlName="codigo"
                                (change)="onSelectByCodigo($event)"
                                class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none appearance-none cursor-pointer">
                            <option value="">-- Código --</option>
                            <option *ngFor="let h of herramientas" [value]="h.codigo">
                                {{ h.codigo }}
                            </option>
                        </select>
                    </div>

                    <div class="w-full lg:w-32 form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Coincidencias
                        </label>
                        <input type="text" [value]="coincidencias()" readonly
                               class="w-full h-11 text-sm font-black text-center border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-gray-50 dark:bg-[#0F172AFF] text-black dark:text-white outline-none cursor-default">
                    </div>
                </div>

                <!-- Row 2: Nombre + P/N + S/N + Marca -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <div class="form-group md:col-span-2">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Nombre
                        </label>
                        <input type="text" formControlName="nombre"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            P/N
                        </label>
                        <input type="text" formControlName="pn"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400 font-mono">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            S/N
                        </label>
                        <input type="text" formControlName="sn"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400 font-mono">
                    </div>
                </div>

                <!-- Row 3: Ubicacion + Existencia + F. Vencimiento + Unidad -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Ubicación
                        </label>
                        <input type="text" formControlName="ubicacion"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Existencia
                        </label>
                        <input type="text" formControlName="existencia" readonly
                               class="w-full h-11 text-sm font-black text-center border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-gray-50 dark:bg-[#0F172AFF] text-black dark:text-white outline-none cursor-default">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Fecha Vencimiento
                        </label>
                        <input type="text" formControlName="fechaVencimiento"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Unidad
                        </label>
                        <input type="text" formControlName="unidad"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400">
                    </div>
                </div>

                <!-- Row 4: Estado Fisico + Marca + Cantidad + Observacion -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Estado Físico
                        </label>
                        <select formControlName="estadoFisico"
                                class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none appearance-none cursor-pointer">
                            <option value="BUENO">BUENO</option>
                            <option value="REGULAR">REGULAR</option>
                            <option value="MALO">MALO</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Marca
                        </label>
                        <input type="text" formControlName="marca"
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Cantidad
                        </label>
                        <input type="number" formControlName="cantidad"
                               class="w-full h-11 text-sm font-black border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none">
                    </div>

                    <div class="form-group">
                        <label class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 mb-1.5 block">
                            Observación
                        </label>
                        <input type="text" formControlName="observacion"
                               placeholder="Notas..."
                               class="w-full h-11 text-sm font-bold border-2 border-black dark:border-slate-600 rounded-lg px-4 bg-white dark:bg-[#0F172AFF] text-black dark:text-white focus:shadow-[3px_3px_0px_0px_#000] transition-shadow outline-none placeholder:text-gray-400">
                    </div>
                </div>
            </form>
        </div>

        <!-- Image Card -->
        <div class="neo-card-base bg-white dark:bg-slate-800 overflow-hidden relative z-10">
            <div class="flex items-center gap-2 p-4 pb-2 border-b-2 border-black dark:border-gray-600">
                <mat-icon class="text-black dark:text-white !text-xl">image</mat-icon>
                <h3 class="font-black text-base uppercase text-black dark:text-white">Imagen de la Herramienta</h3>
            </div>

            <div class="p-4">
                <div class="bg-gray-100 dark:bg-gray-800 border-2 border-black rounded-lg overflow-hidden shadow-[3px_3px_0px_0px_#000] w-full h-[300px] flex flex-col relative">
                    <div *ngIf="selectedImage(); else noImageTemplate" class="flex-1 p-2 flex items-center justify-center bg-white dark:bg-gray-900 overflow-hidden">
                        <img [src]="selectedImage()" alt="Herramienta" class="w-full h-full object-contain">
                    </div>

                    <ng-template #noImageTemplate>
                        <div class="flex-1 flex flex-col items-center justify-center text-gray-400 p-4 border-dashed border-2 border-gray-300 m-4 rounded bg-cyan-100/30 dark:bg-cyan-900/10">
                            <mat-icon class="!text-5xl !w-12 !h-12 opacity-30">image</mat-icon>
                            <p class="font-bold uppercase text-[10px] opacity-60 mt-2 text-center">Imagen de la herramienta</p>
                        </div>
                    </ng-template>

                    <div class="bg-[#0F172AFF] py-2 px-4 flex justify-center border-t-2 border-black shrink-0">
                        <button type="button" (click)="fileInput.click()"
                                class="w-full py-1.5 bg-white text-black font-black border-2 border-black rounded shadow-[2px_2px_0px_0px_#000] hover:translate-y-0.5 hover:shadow-none transition-all uppercase text-xs flex items-center justify-center gap-2">
                            <mat-icon class="!w-4 !h-4 !text-base">{{ selectedImage() ? 'edit' : 'upload' }}</mat-icon>
                            {{ selectedImage() ? 'CAMBIAR IMAGEN' : 'SUBIR IMAGEN' }}
                        </button>
                    </div>

                    <input type="file" #fileInput (change)="onImageSelected($event)" accept="image/*" class="hidden">
                </div>
            </div>
        </div>
    </div>
</div>
