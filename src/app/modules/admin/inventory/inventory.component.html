<div class="relative flex flex-col w-full h-full bg-white dark:bg-[#0F172AFF] transition-colors duration-300 font-sans overflow-hidden">

    <div class="flex items-center gap-4 px-6 py-4 border-b-[3px] border-black shrink-0 bg-white dark:bg-slate-900 relative z-[110]">

        <div class="flex items-center gap-3">
            <h1 class="text-2xl md:text-3xl font-black text-black dark:text-white uppercase tracking-tighter leading-none">
                INVENTARIO
            </h1>
            <div class="flex items-center gap-2 mt-0.5 flex-wrap hidden sm:flex">
                <span class="text-[10px] font-bold bg-amber-400 text-black px-2 py-0.5 rounded inline-block border-2 border-black uppercase tracking-wider">
                    MÓDULO DE INVENTARIO
                </span>
            </div>
        </div>

        <div class="flex-1"></div>

        <button (click)="toggleBandeja()"
                [class.!bg-black]="showBandeja"
                [class.!text-white]="showBandeja"
                class="flex items-center gap-2 px-5 py-2 bg-[#2563eb] border-[2px] border-black font-black text-xs uppercase rounded-xl shadow-[3px_3px_0px_0px_#000] hover:shadow-[1px_1px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] transition-all text-white">
            <mat-icon class="!text-base">apps</mat-icon>
            <span class="hidden sm:inline">MÓDULOS</span>
            <mat-icon class="!text-sm transition-transform duration-200" [class.rotate-180]="showBandeja">expand_more</mat-icon>
        </button>

        <div class="w-px h-8 bg-black/20 dark:bg-white/20 mx-1"></div>

        <button (click)="openConsultarInventario()"
                class="flex items-center gap-2 px-5 py-2 bg-black dark:bg-slate-700 border-[2px] border-black font-black text-xs uppercase rounded-xl shadow-[3px_3px_0px_0px_rgba(0,0,0,0.5)] hover:shadow-[1px_1px_0px_0px_rgba(0,0,0,0.5)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all text-white">
            <mat-icon class="!text-base">search</mat-icon>
            <span class="hidden sm:inline">Consultar Inventario</span>
        </button>
    </div>

    <div *ngIf="showBandeja" (click)="closeBandeja()" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm transition-all duration-300"></div>

    <div *ngIf="showBandeja"
         class="absolute top-[80px] left-2 right-2 md:left-auto md:right-6 md:w-auto z-[110] bg-white dark:bg-slate-800 border-[3px] border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] rounded-xl p-4 animate-in slide-in-from-top-2 duration-150">

        <p class="text-[10px] font-black uppercase tracking-widest text-black dark:text-white mb-3 px-1 border-b-2 border-black pb-1.5">
            Seleccionar Módulo de Inventario
        </p>

        <div class="flex gap-3 overflow-x-auto custom-scrollbar pb-2 pt-1 px-1">

            <button (click)="openModule(1)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(1) ? '#1a3edc' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(1)" [class.text-black]="!isTabOpen(1)">warehouse</mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(1)" [class.text-black]="!isTabOpen(1)">ALMACÉNES Y</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(1)" [class.text-gray-700]="!isTabOpen(1)">UBICACIONES</p>
            </button>

            <button (click)="openModule(2)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(2) ? '#FFC501' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:plus-circle" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(2)" [class.text-black]="!isTabOpen(2)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(2)" [class.text-black]="!isTabOpen(2)">CREAR</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(2)" [class.text-gray-700]="!isTabOpen(2)">MATERIAL</p>
            </button>

            <button (click)="openModule(3)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(3) ? '#1AAA1F' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:arrow-down-tray" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(3)" [class.text-black]="!isTabOpen(3)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(3)" [class.text-black]="!isTabOpen(3)">ENTRADA</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(3)" [class.text-gray-700]="!isTabOpen(3)">MATERIAL</p>
            </button>

            <button (click)="openModule(4)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(4) ? '#e94125' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:arrow-up-tray" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(4)" [class.text-black]="!isTabOpen(4)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(4)" [class.text-black]="!isTabOpen(4)">SALIDA</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(4)" [class.text-gray-700]="!isTabOpen(4)">MATERIAL</p>
            </button>

            <button (click)="openModule(5)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(5) ? '#0891b2' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:clock" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(5)" [class.text-black]="!isTabOpen(5)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(5)" [class.text-black]="!isTabOpen(5)">HISTORIAL</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(5)" [class.text-gray-700]="!isTabOpen(5)">ESTADOS</p>
            </button>

            <button (click)="openModule(6)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(6) ? '#16a34a' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:cloud-arrow-up" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(6)" [class.text-black]="!isTabOpen(6)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(6)" [class.text-black]="!isTabOpen(6)">MIGRACIÓN</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(6)" [class.text-gray-700]="!isTabOpen(6)">EXCEL</p>
            </button>

            <button (click)="openModule(7)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(7) ? '#1A3EDC' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:cube" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(7)" [class.text-black]="!isTabOpen(7)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(7)" [class.text-black]="!isTabOpen(7)">GESTIÓN</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate" [class.text-white]="isTabOpen(7)" [class.text-gray-700]="!isTabOpen(7)">KITS</p>
            </button>

            <button (click)="openModule(8)"
                    class="group relative flex flex-col items-center gap-1.5 p-3 rounded-xl border-[2px] border-black transition-all hover:-translate-y-1 w-[120px] shrink-0"
                    [style.background-color]="isTabOpen(8) ? '#7113CF' : '#f8f9fc'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <mat-icon svgIcon="heroicons_outline:chart-bar" class="!w-8 !h-8 !text-3xl shrink-0" [class.text-white]="isTabOpen(8)" [class.text-black]="!isTabOpen(8)"></mat-icon>
                <p class="text-[10px] font-black uppercase leading-tight text-center w-full" [class.text-white]="isTabOpen(8)" [class.text-black]="!isTabOpen(8)">REPORTES</p>
                <p class="text-[9px] font-bold uppercase leading-tight text-center w-full truncate text-gray-700">&nbsp;</p>
            </button>

        </div>
    </div>

    <div *ngIf="openTabs.length > 0"
         class="flex items-center gap-2 px-5 py-2.5 border-b-[3px] border-black bg-gray-100 dark:bg-slate-800 overflow-x-auto relative z-10 custom-scrollbar shadow-sm">

        <div *ngFor="let tab of openTabs; trackBy: trackByTabId"
             (click)="setActiveTab(tab.id)"
             class="flex items-center gap-2 px-3 py-1.5 rounded-lg border-[2px] border-black cursor-pointer transition-all whitespace-nowrap select-none shrink-0"
             [style.background-color]="tab.id === activeTabId ? tab.color : 'white'"
             [style.box-shadow]="tab.id === activeTabId ? '2px 2px 0px 0px rgba(0,0,0,1)' : 'none'">

            <mat-icon [svgIcon]="tab.svgIcon"
                      class="!text-sm !w-4 !h-4 shrink-0"
                      [style.color]="tab.id === activeTabId ? tab.textColor : 'black'">
            </mat-icon>

            <div class="flex gap-1.5 leading-none items-center">
                <span class="text-[11px] font-black uppercase" [style.color]="tab.id === activeTabId ? tab.textColor : 'black'">{{ tab.label }}</span>
                <span class="text-[11px] font-black uppercase opacity-70" [style.color]="tab.id === activeTabId ? tab.textColor : 'black'">{{ tab.sublabel }}</span>
            </div>

            <button (click)="closeTab(tab.id); $event.stopPropagation()"
                    class="w-5 h-5 ml-1 flex items-center justify-center rounded bg-black/10 hover:bg-red-500 hover:text-white transition-all shrink-0"
                    [style.color]="tab.id === activeTabId ? tab.textColor : 'black'">
                <mat-icon class="!text-[12px] !w-3 !h-3">close</mat-icon>
            </button>
        </div>

    </div>

    <div class="flex-1 overflow-hidden relative bg-[#f8f9fc] dark:bg-[#0F172AFF] z-0">

        <div *ngFor="let tab of openTabs; trackBy: trackByTabId"
             [style.display]="tab.id === activeTabId ? 'flex' : 'none'"
             class="w-full h-full flex-col overflow-hidden">
            <ng-container [ngComponentOutlet]="tab.component" [ngComponentOutletInjector]="tab.injector"></ng-container>
        </div>

        <div *ngIf="openTabs.length === 0"
             class="flex items-start justify-end h-full relative overflow-hidden bg-black">
            <img src="images/INVENTARIO.png"
                 alt=""
                 class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none"
                 style="opacity: 1;" />
            <div class="absolute inset-0 hidden dark:block bg-black/50 pointer-events-none z-[1]"></div>
            <!-- Mensaje tooltip esquina superior derecha -->
            <div class="relative z-10 mt-4 mr-4 select-none">
                <div class="flex justify-end pr-6">
                    <div class="w-3 h-3 bg-white dark:bg-slate-800 border-t-[2px] border-r-[2px] border-black rotate-[-45deg] -mb-[7px] relative z-10"></div>
                </div>
                <div class="bg-white dark:bg-slate-800 border-[2px] border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] rounded-xl px-3 py-2.5 flex items-center gap-2.5 max-w-[230px]">
                    <mat-icon svgIcon="heroicons_outline:wrench-screwdriver" class="!text-xl !w-5 !h-5 text-black dark:text-white flex-shrink-0"></mat-icon>
                    <div>
                        <p class="text-[11px] font-black uppercase text-black dark:text-white leading-tight">Módulo de Inventario</p>
                        <p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 mt-0.5 leading-tight">
                            Pulse <strong class="text-black dark:text-white">MÓDULOS</strong> para comenzar.
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>
