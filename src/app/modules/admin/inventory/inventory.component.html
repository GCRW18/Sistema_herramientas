<div class="flex flex-col w-full h-full bg-white dark:bg-[#0F172AFF] transition-colors duration-300 font-sans overflow-hidden">

    <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 relative">

        <div class="max-w-[1600px] mx-auto relative z-10" *ngIf="showCards">
            <div class="flex items-start gap-1 mt-1 md:gap-2 mb-3">
                <div>
                    <h1 class="text-3xl md:text-5xl font-black text-black dark:text-white uppercase tracking-tighter drop-shadow-[3px_3px_0px_rgba(255,255,255,0.5)] dark:drop-shadow-none leading-none">
                        INVENTARIO
                    </h1>
                </div>
            </div>

            <!-- ========== MAIN GRID: Sidebar LEFT + Cards ========== -->
            <div class="grid grid-cols-1 lg:grid-cols-[250px_1fr] xl:grid-cols-[280px_1fr] gap-3 md:gap-4 mb-6">

                <!-- ===== LEFT SIDEBAR ===== -->
                <div class="flex flex-col gap-2 md:gap-3">

                    <!-- Dashboard Button -->
                    <button [routerLink]="['dashboard']"
                            class="inv-sidebar-btn group hover:bg-cyan-600">
                        <span>DASHBOARD</span>
                    </button>

                    <!-- Movimientos Button -->
                    <button [routerLink]="['movimientos']"
                            class="inv-sidebar-btn group hover:bg-slate-600">
                        <span>MOVIMIENTOS</span>
                    </button>

                    <!-- Card 1: Almacen y Ubicaciones (tall) -->
                    <div class="neo-card-inv group flex-1 min-h-[200px] lg:min-h-[260px] hover:bg-[#FF6A00FF] dark:hover:bg-blue-800/20" (click)="openGestionUbicaciones()">
                        <div class="flex flex-col h-full p-4 md:p-5">
                            <span class="inv-number">1</span>
                            <p class="inv-label inv-label-lg mt-2">ALMACEN Y<br>UBICACIONES</p>
                            <div class="flex-1 flex items-center justify-center mt-3">
                                <mat-icon class="inv-icon-xl group-hover:rotate-[25deg] transition-transform duration-300" svgIcon="heroicons_outline:building-storefront"></mat-icon>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ===== RIGHT: Cards Grid (2 columns) ===== -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 auto-rows-min">

                    <!-- Card 2: Consultar Inventario -->
                    <div class="neo-card-inv group hover:bg-[#1A3EDCFF] dark:hover:bg-blue-800/20" (click)="openConsultarInventario()">
                        <div class="flex flex-col h-full p-4 md:p-5 min-h-[150px]">
                            <span class="inv-number">2</span>
                            <div class="flex-1 flex flex-col items-center justify-center gap-1">
                                <mat-icon class="inv-icon-lg group-hover:rotate-[20deg] transition-transform duration-300" svgIcon="heroicons_outline:wrench-screwdriver"></mat-icon>
                                <p class="inv-label text-center">CONSULTAR<br>INVENTARIO</p>
                            </div>
                        </div>
                    </div>

                    <!-- Card 3: Gestion Kits -->
                    <div class="neo-card-inv group hover:bg-[#1AAA1FFF] dark:hover:bg-blue-800/20" [routerLink]="['lista-kits']">
                        <div class="flex flex-col h-full p-4 md:p-5 min-h-[150px]">
                            <span class="inv-number">3</span>
                            <div class="flex-1 flex flex-col items-center justify-center gap-1">
                                <mat-icon class="inv-icon-lg group-hover:scale-110 transition-transform duration-300" svgIcon="heroicons_outline:cube"></mat-icon>
                                <p class="inv-label text-center">GESTION<br>KITS</p>
                            </div>
                        </div>
                    </div>

                    <!-- Card 5: Crear -->
                    <div class="neo-card-inv group hover:bg-[#FFC501FF] dark:hover:bg-blue-800/20" (click)="openCrearMaterial()">
                        <div class="flex items-center h-full p-3 md:p-4 min-h-[120px] gap-3">
                            <span class="inv-number inv-number-sm shrink-0">5</span>
                            <p class="inv-label inv-label-sm flex-1">CREAR<br>MATERIAL</p>
                            <mat-icon class="inv-icon-md group-hover:rotate-[-15deg] transition-transform duration-300 shrink-0" svgIcon="heroicons_outline:plus-circle"></mat-icon>
                        </div>
                    </div>

                    <!-- Card 6: Entrada -->
                    <div class="neo-card-inv group hover:bg-[#e94125] dark:hover:bg-blue-800/20" (click)="openEntradaMaterial()">
                        <div class="flex items-center h-full p-3 md:p-4 min-h-[120px] gap-3">
                            <span class="inv-number inv-number-sm shrink-0">6</span>
                            <p class="inv-label inv-label-sm flex-1">ENTRADA<br>MATERIAL</p>
                            <mat-icon class="inv-icon-md group-hover:scale-110 transition-transform duration-300 shrink-0" svgIcon="heroicons_outline:arrow-down-tray"></mat-icon>
                        </div>
                    </div>

                    <!-- Card 4: Reportes (wide - spans 2 cols) -->
                    <div class="neo-card-inv group col-span-1 sm:col-span-2 hover:bg-[#7113CFFF] dark:hover:bg-blue-800/20" [routerLink]="['reportes']">
                        <div class="flex items-center h-full p-4 md:p-5 min-h-[100px] gap-4">
                            <span class="inv-number shrink-0">4</span>
                            <p class="inv-label inv-label-lg flex-1">REPORTES</p>
                            <mat-icon class="inv-icon-lg group-hover:rotate-[15deg] transition-transform duration-300 shrink-0" svgIcon="heroicons_outline:chart-bar"></mat-icon>
                        </div>
                    </div>

                    <!-- Card 7: Salida (wide) -->
                    <div class="neo-card-inv group col-span-1 sm:col-span-2 hover:bg-[#203f77] dark:hover:bg-blue-800/20" (click)="openSalidaMaterial()">
                        <div class="flex items-center h-full p-3 md:p-4 min-h-[100px] gap-4">
                            <span class="inv-number inv-number-sm shrink-0">7</span>
                            <p class="inv-label inv-label-sm flex-1">SALIDA<br>MATERIAL</p>
                            <mat-icon class="inv-icon-md group-hover:rotate-[15deg] transition-transform duration-300 shrink-0" svgIcon="heroicons_outline:arrow-up-tray"></mat-icon>
                        </div>
                    </div>

                    <!-- Card 8: Historial de Estados -->
                    <div class="neo-card-inv group hover:bg-[#0891b2] dark:hover:bg-blue-800/20" (click)="openHistorialEstados()">
                        <div class="flex items-center h-full p-3 md:p-4 min-h-[120px] gap-3">
                            <span class="inv-number inv-number-sm shrink-0">8</span>
                            <p class="inv-label inv-label-sm flex-1">HISTORIAL<br>ESTADOS</p>
                            <mat-icon class="inv-icon-md group-hover:scale-110 transition-transform duration-300 shrink-0" svgIcon="heroicons_outline:clock"></mat-icon>
                        </div>
                    </div>

                    <!-- Card 9: Migracion Excel -->
                    <div class="neo-card-inv group hover:bg-[#16a34a] dark:hover:bg-blue-800/20" (click)="openMigracionExcel()">
                        <div class="flex items-center h-full p-3 md:p-4 min-h-[120px] gap-3">
                            <span class="inv-number inv-number-sm shrink-0">9</span>
                            <p class="inv-label inv-label-sm flex-1">MIGRACION<br>EXCEL</p>
                            <mat-icon class="inv-icon-md group-hover:rotate-[-15deg] transition-transform duration-300 shrink-0" svgIcon="heroicons_outline:cloud-arrow-up"></mat-icon>
                        </div>
                    </div>

                </div>

            </div>

        </div>

        <router-outlet></router-outlet>
    </div>
</div>
