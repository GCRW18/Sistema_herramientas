<div class="relative flex flex-col w-full h-full bg-white dark:bg-[#0F172AFF] transition-colors duration-300 font-sans overflow-hidden">

    <!-- ===== HEADER ===== -->
    <div class="flex items-center gap-3 px-5 py-3 border-b-2 border-black dark:border-slate-700 shrink-0 bg-white dark:bg-[#0F172AFF] relative z-30">
        <h1 class="text-3xl md:text-4xl font-black text-black dark:text-white uppercase tracking-tighter leading-none">
            INVENTARIO
        </h1>
        <span class="text-[10px] font-bold bg-[#111A43] text-white px-3 py-1 rounded-sm border border-black uppercase tracking-wider hidden sm:inline">
            MÓDULO DE INVENTARIO
        </span>
        <div class="flex-1"></div>

        <!-- Botón MÓDULOS / bandeja -->
        <button (click)="toggleBandeja()"
                [class.!bg-[#111A43]]="showBandeja"
                [class.!text-white]="showBandeja"
                class="flex items-center gap-2 px-5 py-2 bg-white dark:bg-slate-800 border-2 border-black font-black text-xs uppercase rounded-full shadow-[3px_3px_0px_0px_#000] hover:shadow-[1px_1px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] transition-all text-black dark:text-white">
            <mat-icon class="!text-base">apps</mat-icon>
            <span class="hidden sm:inline">MÓDULOS</span>
            <mat-icon class="!text-sm transition-transform duration-200" [class.rotate-180]="showBandeja">expand_more</mat-icon>
        </button>

        <button (click)="openConsultarInventario()"
                class="flex items-center gap-2 px-5 py-2 bg-white dark:bg-slate-800 border-2 border-black font-black text-xs uppercase rounded-full shadow-[3px_3px_0px_0px_#000] hover:shadow-[1px_1px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] transition-all text-black dark:text-white">
            <mat-icon class="!text-base">search</mat-icon>
            <span class="hidden sm:inline">Consultar Inventario</span>
        </button>
    </div>

    <!-- ===== BANDEJA: backdrop ===== -->
    <div *ngIf="showBandeja"
         (click)="closeBandeja()"
         class="fixed inset-0 z-20 bg-black/20">
    </div>

    <!-- ===== BANDEJA: panel desplegable ===== -->
    <div *ngIf="showBandeja"
         class="absolute top-[56px] left-2 right-2 md:left-auto md:right-4 md:w-auto z-30 bg-white dark:bg-[#111A43] border-2 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] rounded-2xl p-3 animate-in slide-in-from-top-2 duration-150">

        <p class="text-[9px] font-black uppercase tracking-widest text-gray-400 dark:text-slate-400 mb-2 px-1">
            Seleccionar módulo de inventario
        </p>

        <div class="flex flex-wrap gap-2">

            <!-- Módulo 1: Almacén y Ubicaciones -->
            <button (click)="openModule(1)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(1) ? '#FF6A00' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(1)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:building-storefront"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">ALMACÉN Y</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">UBICACIONES</p>
            </button>

            <!-- Módulo 2: Crear Material -->
            <button (click)="openModule(2)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(2) ? '#FFC501' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(2)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:plus-circle"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">CREAR</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">MATERIAL</p>
            </button>

            <!-- Módulo 3: Entrada Material -->
            <button (click)="openModule(3)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(3) ? '#1AAA1F' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(3)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:arrow-down-tray"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">ENTRADA</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">MATERIAL</p>
            </button>

            <!-- Módulo 4: Salida Material -->
            <button (click)="openModule(4)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(4) ? '#e94125' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(4)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:arrow-up-tray"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">SALIDA</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">MATERIAL</p>
            </button>

            <!-- Módulo 5: Historial Estados -->
            <button (click)="openModule(5)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(5) ? '#0891b2' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(5)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:clock"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">HISTORIAL</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">ESTADOS</p>
            </button>

            <!-- Módulo 6: Migración Excel -->
            <button (click)="openModule(6)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(6) ? '#16a34a' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(6)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:cloud-arrow-up"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">MIGRACIÓN</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">EXCEL</p>
            </button>

            <!-- Módulo 7: Gestión Kits -->
            <button (click)="openModule(7)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(7) ? '#1A3EDC' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(7)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:cube"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">GESTIÓN</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">KITS</p>
            </button>

            <!-- Módulo 8: Reportes -->
            <button (click)="openModule(8)"
                    class="group relative flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-black transition-all hover:scale-[1.04] active:scale-[0.97] min-w-[70px]"
                    [style.background-color]="isTabOpen(8) ? '#7113CF' : 'transparent'"
                    [style.box-shadow]="'3px 3px 0px 0px rgba(0,0,0,1)'">
                <div *ngIf="isTabOpen(8)" class="absolute top-1 right-1 w-2 h-2 rounded-full bg-black"></div>
                <mat-icon svgIcon="heroicons_outline:chart-bar"
                          class="!w-6 !h-6 !text-2xl text-black dark:text-white shrink-0"></mat-icon>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">REPORTES</p>
                <p class="text-[9px] font-black uppercase leading-tight text-black dark:text-white text-center w-full truncate">&nbsp;</p>
            </button>

        </div>
    </div>

    <!-- ===== BARRA DE PESTAÑAS ===== -->
    <div *ngIf="openTabs.length > 0"
         class="flex items-center gap-2 px-4 py-2 border-b-2 border-black dark:border-slate-700 shrink-0 bg-white dark:bg-[#0F172AFF] overflow-x-auto relative z-10">

        <div *ngFor="let tab of openTabs; trackBy: trackByTabId"
             (click)="setActiveTab(tab.id)"
             class="flex items-center gap-2 px-3 py-1.5 rounded-full border-2 border-black cursor-pointer transition-all whitespace-nowrap select-none shrink-0"
             [style.background-color]="tab.id === activeTabId ? tab.color : 'transparent'"
             [style.box-shadow]="tab.id === activeTabId ? '2px 2px 0px 0px rgba(0,0,0,1)' : 'none'">

            <mat-icon [svgIcon]="tab.svgIcon"
                      class="!text-sm !w-4 !h-4 shrink-0"
                      [style.color]="tab.id === activeTabId ? tab.textColor : 'inherit'">
            </mat-icon>

            <div class="flex gap-1 leading-none">
                <span class="text-[10px] font-black uppercase"
                      [style.color]="tab.id === activeTabId ? tab.textColor : 'inherit'">
                    {{ tab.label }}
                </span>
                <span class="text-[10px] font-black uppercase opacity-70"
                      [style.color]="tab.id === activeTabId ? tab.textColor : 'inherit'">
                    {{ tab.sublabel }}
                </span>
            </div>

            <button (click)="closeTab(tab.id); $event.stopPropagation()"
                    class="w-4 h-4 flex items-center justify-center rounded-full opacity-50 hover:opacity-100 hover:bg-black/20 transition-all shrink-0"
                    [style.color]="tab.id === activeTabId ? tab.textColor : 'inherit'">
                <mat-icon class="!text-xs !w-3 !h-3">close</mat-icon>
            </button>
        </div>

    </div>

    <!-- ===== ÁREA PRINCIPAL ===== -->
    <div class="flex-1 overflow-hidden relative">

        <!-- Pestañas activas (todas en DOM, solo la activa visible) -->
        <div *ngFor="let tab of openTabs; trackBy: trackByTabId"
             [style.display]="tab.id === activeTabId ? 'flex' : 'none'"
             class="w-full h-full flex-col overflow-hidden">
            <ng-container [ngComponentOutlet]="tab.component" [ngComponentOutletInjector]="tab.injector"></ng-container>
        </div>

        <!-- Placeholder cuando no hay pestañas abiertas -->
        <div *ngIf="openTabs.length === 0"
             class="flex flex-col items-center justify-center h-full bg-[#f8f9fc] dark:bg-[#0F172AFF] relative">
            <div class="absolute top-10 right-10 w-48 h-48 bg-[#111A43] rounded-full border-4 border-black opacity-5 pointer-events-none"></div>
            <div class="absolute bottom-10 left-10 w-24 h-24 bg-[#1A3EDCFF] rotate-12 border-4 border-black opacity-5 pointer-events-none"></div>
            <div class="flex flex-col items-center text-center opacity-30 dark:opacity-20 select-none">
                <mat-icon svgIcon="heroicons_outline:wrench-screwdriver" class="!text-[100px] !w-28 !h-28 text-black dark:text-white"></mat-icon>
                <p class="text-2xl font-black uppercase text-black dark:text-white mt-4 tracking-tight">
                    Seleccione un módulo de inventario
                </p>
                <p class="text-sm font-bold text-gray-500 dark:text-gray-400 mt-2">
                    Pulse <strong>MÓDULOS</strong> en la barra superior para comenzar
                </p>
            </div>
        </div>

    </div>

</div>
