<div class="bg-[#f8f9fc] dark:bg-slate-900 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] overflow-hidden flex flex-col font-sans"
     style="width:480px; max-width:95vw">

    <!-- HEADER -->
    <div class="bg-[#0F172AFF] text-white px-5 py-3 flex justify-between items-center shrink-0"
         cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-white border-2 border-black rounded flex items-center justify-center shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] shake-icon">
                <mat-icon class="text-red-600 !text-base">warning</mat-icon>
            </div>
            <div>
                <h2 class="text-sm font-black uppercase tracking-tight leading-none">{{ title }}</h2>
                <p class="text-[10px] text-red-100 font-bold uppercase mt-0.5">Esta acción no se puede deshacer</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button (click)="cancel()"
                    class="px-3 py-1.5 bg-[#FF1414FF] text-white font-black text-[10px] border-2 border-black rounded-lg shadow-[2px_2px_0px_0px_#000] hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none transition-all uppercase">
                Cancelar
            </button>
            <button (click)="confirm()"
                    class="px-3 py-1.5 bg-amber-400 text-black font-black text-[10px] border-2 border-black rounded-lg shadow-[2px_2px_0px_0px_#000] hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none transition-all uppercase flex items-center gap-1.5">
                <mat-icon class="!text-black">delete_forever</mat-icon> {{ confirmLabel }}
            </button>
        </div>
    </div>

    <!-- BODY -->
    <div class="p-5 bg-white dark:bg-slate-900 flex flex-col items-center text-center gap-3">

        <div class="w-16 h-16 bg-[#FF1414FF] dark:bg-red-900/30 border-2 border-black rounded-full flex items-center justify-center shadow-[3px_3px_0px_0px_#000]">
            <mat-icon class="!text-3xl text-white">delete_forever</mat-icon>
        </div>

        <p class="text-sm font-bold text-black dark:text-white">
            ¿Está seguro de eliminar este <span class="uppercase font-black">{{ itemKind }}</span>?
        </p>

        <div class="bg-white dark:bg-slate-800 border-2 border-black rounded-xl px-4 py-3 shadow-[3px_3px_0px_0px_#000] w-full">
            <p *ngIf="itemCode" class="text-[10px] font-bold text-gray-500 uppercase">Código</p>
            <p *ngIf="itemCode" class="font-mono font-black text-base text-black dark:text-white">{{ itemCode }}</p>
            <p *ngIf="itemName" class="text-sm font-bold text-black dark:text-gray-200 mt-1">{{ itemName }}</p>
        </div>

        <p *ngIf="warning"
           class="text-[11px] font-bold text-red-700 dark:text-red-400 bg-red-100 dark:bg-red-900/30 border-2 border-red-400 rounded-lg px-3 py-2 w-full">
            <mat-icon class="!text-sm align-middle">info</mat-icon>
            {{ warning }}
        </p>
    </div>
</div>
