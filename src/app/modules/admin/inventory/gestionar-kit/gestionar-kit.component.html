<div class="neo-dialog-panel flex flex-col w-full h-full max-h-[90vh] bg-white dark:bg-[#0a0f29] overflow-hidden rounded-xl border-[3px] border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]"
     cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragBoundary=".cdk-overlay-container">

    <!-- Header con diseño mejorado -->
    <div cdkDragHandle class="flex items-center justify-between px-6 py-5 bg-gradient-to-r from-[#111A43] to-[#1a2657] border-b-[3px] border-black cursor-move select-none relative z-10 overflow-hidden">
        <!-- Decoración de fondo -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"></div>

        <div class="flex items-center gap-4 relative z-10">
            <div class="flex items-center justify-center w-14 h-14 bg-[#FFE500] border-[3px] border-black shadow-[3px_3px_0px_0px_#000] transform -rotate-3 hover:rotate-0 transition-transform">
                <mat-icon class="!text-3xl !w-8 !h-8 text-black">inventory_2</mat-icon>
            </div>
            <div>
                <h2 class="text-3xl font-[1000] text-white uppercase tracking-tighter leading-none">
                    GESTIONAR <span class="text-[#FFE500]">KIT</span>
                </h2>
                <div class="flex items-center gap-2 mt-2">
                    <span class="w-2 h-2 bg-amber-500 border border-white rounded-full animate-pulse"></span>
                    <p class="text-[10px] font-black text-white/70 uppercase tracking-widest">
                        Configuración de Activos
                    </p>
                </div>
            </div>
        </div>

        <button type="button" (click)="cerrar()"
                class="w-10 h-10 flex items-center justify-center border-[3px] border-white bg-transparent hover:bg-red-500 text-white rounded-lg shadow-[2px_2px_0px_0px_rgba(255,255,255,0.3)] active:translate-y-[2px] active:shadow-none transition-all relative z-10">
            <mat-icon class="font-black">close</mat-icon>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto p-6 md:p-8 bg-[#f8f9fa] dark:bg-[#0f172a] relative">

        <div class="absolute top-0 right-0 w-32 h-32 bg-gray-200 dark:bg-white/5 rounded-bl-full opacity-50 pointer-events-none"></div>

        <form [formGroup]="kitForm" class="space-y-8 relative z-10">

            <!-- Sección: Información General -->
            <div class="bg-white dark:bg-[#151e4a] border-[3px] border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,0.15)] rounded-lg p-6 relative hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,0.15)] hover:translate-x-[-2px] hover:translate-y-[-2px] transition-all">
                <div class="absolute -top-3 left-4 bg-[#111A43] text-white px-4 py-1.5 border-[3px] border-black text-xs font-black uppercase transform -rotate-1 shadow-[2px_2px_0px_0px_#000]">
                    <mat-icon class="!text-sm !w-4 !h-4 inline-block mr-1">info</mat-icon>
                    Información General
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-2">
                    <div>
                        <label class="block text-xs font-black text-gray-700 dark:text-gray-300 uppercase mb-2 flex items-center gap-1">
                            <mat-icon class="!text-sm !w-4 !h-4">label</mat-icon>
                            Nombre del Kit <span class="text-red-500 ml-1">*</span>
                        </label>
                        <mat-form-field appearance="fill" class="w-full">
                            <input matInput formControlName="nombreKit" placeholder="EJ: KIT MANTENIMIENTO A">
                        </mat-form-field>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-700 dark:text-gray-300 uppercase mb-2 flex items-center gap-1">
                            <mat-icon class="!text-sm !w-4 !h-4">place</mat-icon>
                            Ubicación Física
                        </label>
                        <mat-form-field appearance="fill" class="w-full">
                            <input matInput formControlName="ubicacion" placeholder="EJ: ESTANTE-B3">
                        </mat-form-field>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-black text-gray-700 dark:text-gray-300 uppercase mb-2 flex items-center gap-1">
                            <mat-icon class="!text-sm !w-4 !h-4">description</mat-icon>
                            Descripción / Notas
                        </label>
                        <mat-form-field appearance="fill" class="w-full">
                            <textarea matInput formControlName="descripcionKit" rows="3" placeholder="Detalles operativos del kit..."></textarea>
                        </mat-form-field>
                    </div>
                </div>
            </div>

            <!-- Sección: Lista de Herramientas -->
            <div class="bg-white dark:bg-[#151e4a] border-[3px] border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,0.15)] rounded-lg overflow-hidden flex flex-col h-[450px] hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,0.15)] hover:translate-x-[-2px] hover:translate-y-[-2px] transition-all">

                <div class="p-5 border-b-[3px] border-black bg-gradient-to-r from-gray-50 to-gray-100 dark:from-[#1e293b] dark:to-[#1a2440] flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-[#111A43] border-[2px] border-black rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#000]">
                            <mat-icon class="text-white !text-xl">build</mat-icon>
                        </div>
                        <div>
                            <h3 class="font-[1000] text-lg uppercase text-black dark:text-white leading-none">
                                Herramientas del Kit
                            </h3>
                            <p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase mt-1">
                                Total: <span class="text-[#FFE500]">{{ items.length }} items</span>
                            </p>
                        </div>
                    </div>

                    <button type="button" (click)="agregarItem()"
                            class="px-5 py-2.5 bg-[#FFE500] text-black font-[1000] text-xs border-[3px] border-black rounded-lg shadow-[3px_3px_0px_0px_#000] hover:shadow-[1px_1px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] active:shadow-none transition-all uppercase flex items-center gap-2">
                        <mat-icon class="!w-4 !h-4 !text-base">add_circle</mat-icon>
                        Agregar Item
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto bg-gray-50 dark:bg-[#0f172a] p-4">

                    <div formArrayName="items" class="space-y-3">
                        <div *ngFor="let item of items.controls; let i = index"
                             [formGroupName]="i"
                             class="group flex flex-col md:flex-row gap-3 items-start md:items-center bg-white dark:bg-[#1e293b] p-4 border-[3px] border-black rounded-lg shadow-[2px_2px_0px_0px_rgba(0,0,0,0.3)] hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,0.5)] hover:translate-x-[-1px] hover:translate-y-[-1px] transition-all duration-200">

                            <div class="flex items-center justify-center w-10 h-10 bg-[#111A43] text-white font-black text-sm border-[3px] border-black rounded-lg shrink-0 shadow-[2px_2px_0px_0px_#000]">
                                {{ i + 1 }}
                            </div>

                            <div class="flex-1 w-full grid grid-cols-1 md:grid-cols-12 gap-3">
                                <div class="md:col-span-5">
                                    <input formControlName="descripcion"
                                           class="w-full h-11 px-3 bg-gray-50 dark:bg-[#0f172a] dark:text-white border-[2px] border-gray-300 dark:border-gray-600 focus:border-[#111A43] focus:bg-white dark:focus:bg-[#1a2440] font-bold text-sm uppercase transition-all outline-none placeholder:text-gray-400 rounded-lg shadow-sm focus:shadow-[2px_2px_0px_0px_rgba(17,26,67,0.2)]"
                                           placeholder="DESCRIPCIÓN">
                                </div>
                                <div class="md:col-span-4">
                                    <input formControlName="codigo"
                                           class="w-full h-11 px-3 bg-gray-50 dark:bg-[#0f172a] dark:text-white border-[2px] border-gray-300 dark:border-gray-600 focus:border-[#111A43] focus:bg-white dark:focus:bg-[#1a2440] font-mono text-sm uppercase transition-all outline-none placeholder:text-gray-400 text-center rounded-lg shadow-sm focus:shadow-[2px_2px_0px_0px_rgba(17,26,67,0.2)]"
                                           placeholder="CÓDIGO">
                                </div>
                                <div class="md:col-span-3">
                                    <input formControlName="ubicacion"
                                           class="w-full h-11 px-3 bg-gray-50 dark:bg-[#0f172a] dark:text-white border-[2px] border-gray-300 dark:border-gray-600 focus:border-[#111A43] focus:bg-white dark:focus:bg-[#1a2440] font-bold text-xs uppercase transition-all outline-none placeholder:text-gray-400 text-center rounded-lg shadow-sm focus:shadow-[2px_2px_0px_0px_rgba(17,26,67,0.2)]"
                                           placeholder="UBICACIÓN">
                                </div>
                            </div>

                            <button type="button" (click)="eliminarItem(i)"
                                    class="w-10 h-10 flex items-center justify-center bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border-[2px] border-red-300 dark:border-red-800 hover:bg-red-500 hover:text-white hover:border-red-600 rounded-lg transition-all shrink-0 shadow-[2px_2px_0px_0px_rgba(220,38,38,0.2)]">
                                <mat-icon class="!w-5 !h-5 !text-xl">delete</mat-icon>
                            </button>
                        </div>

                        <div *ngIf="items.length === 0" class="flex flex-col items-center justify-center h-52 opacity-40 border-[3px] border-dashed border-gray-300 dark:border-gray-600 rounded-lg">
                            <div class="w-20 h-20 bg-gray-200 dark:bg-gray-700 border-[3px] border-black rounded-lg flex items-center justify-center mb-3">
                                <mat-icon class="!text-5xl !w-12 !h-12 text-black dark:text-white">inventory</mat-icon>
                            </div>
                            <p class="font-black text-xl uppercase text-black dark:text-white">Kit Vacío</p>
                            <p class="text-xs font-bold text-gray-500 dark:text-gray-400 mt-2">Agrega herramientas al kit</p>
                        </div>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <!-- Footer con botones de acción -->
    <div class="px-6 py-5 bg-gradient-to-r from-gray-50 to-gray-100 dark:from-[#0a0f29] dark:to-[#0f1529] border-t-[3px] border-black flex justify-between items-center gap-4 z-10">
        <div class="flex items-center gap-2 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase">
            <mat-icon class="!text-sm !w-4 !h-4">info</mat-icon>
            <span class="hidden md:block">Gestión de Activos</span>
        </div>

        <div class="flex gap-3">
            <button type="button" (click)="cerrar()"
                    class="h-12 px-6 bg-white dark:bg-slate-700 text-black dark:text-white font-[1000] text-sm border-[3px] border-black rounded-lg shadow-[3px_3px_0px_0px_rgba(0,0,0,0.3)] hover:shadow-[1px_1px_0px_0px_rgba(0,0,0,0.3)] hover:translate-x-[2px] hover:translate-y-[2px] active:shadow-none transition-all uppercase tracking-wide">
                Cancelar
            </button>

            <button type="button" (click)="onSubmit()"
                    [disabled]="!kitForm.valid"
                    class="h-12 px-8 bg-[#111A43] text-white font-[1000] text-sm border-[3px] border-black rounded-lg shadow-[4px_4px_0px_0px_#000] dark:shadow-[4px_4px_0px_0px_rgba(255,229,0,0.3)] hover:shadow-[2px_2px_0px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] active:shadow-none transition-all uppercase tracking-wide disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-x-0 disabled:hover:translate-y-0 disabled:hover:shadow-[4px_4px_0px_0px_#000] flex items-center gap-2">
                <mat-icon class="!w-5 !h-5">save</mat-icon>
                Guardar Kit
            </button>
        </div>
    </div>
</div>
